# TSUNAMI — Agentic Reborn
# Configuration for the Resonant Ark

# --- Primary Model (dense 27B with vision + native function calling) ---
model_backend: api
model_name: "Qwen3.5-27B"
model_endpoint: "http://localhost:8090"
temperature: 0.7
max_tokens: 4096

# --- Fast Model (simple tasks, research, Q&A — 2B, ~100 tok/s) ---
fast_model_name: "Qwen3.5-2B"
fast_model_endpoint: "http://localhost:8092"

# --- Watcher (self-evaluation via fast model) ---
watcher_enabled: false
watcher_model: "Qwen3.5-2B"
watcher_endpoint: "http://localhost:8092"

# --- Paths ---
workspace_dir: "./workspace"
skills_dir: "./skills"

# --- Behavior ---
max_iterations: 200
tool_timeout: 120
error_escalation_threshold: 3
watcher_interval: 5

# --- Search ---
search_backend: duckduckgo

# --- Browser ---
browser_headless: true
