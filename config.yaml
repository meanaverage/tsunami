# TSUNAMI — Agentic Reborn
# Configuration for the Resonant Ark

# --- Primary Model (the reasoning core) ---
model_backend: api
model_name: "qwen3-8b"
model_endpoint: "http://localhost:8090"
temperature: 0.7
max_tokens: 2048

# --- Watcher (self-evaluation, optional lighter model) ---
watcher_enabled: false
watcher_model: "qwen3-8b"
watcher_endpoint: "http://localhost:8090"

# --- Paths ---
workspace_dir: "./workspace"
skills_dir: "./skills"

# --- Behavior ---
max_iterations: 200
tool_timeout: 120
error_escalation_threshold: 3
watcher_interval: 5

# --- Search ---
search_backend: duckduckgo

# --- Tools ---
# "core" = 16 tools (~1800 tokens, faster), "full" = 35 tools (everything)
tool_profile: core

# --- Browser ---
browser_headless: true
