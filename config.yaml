# TSUNAMI — Autonomous Execution Agent
# Configuration for the Resonant Ark

# --- Wave (primary reasoning model) ---
model_backend: api
model_name: "Qwen3.5-9B"
model_endpoint: "http://localhost:8090"
temperature: 0.7
max_tokens: 8192

# --- Eddies (fast workers — 2B on full, same as wave on lite) ---
eddy_endpoint: "http://localhost:8092"

# --- Watcher (2B reviews every 3rd tool call) ---
watcher_enabled: true
watcher_model: "Qwen3.5-2B"
watcher_endpoint: "http://localhost:8092"
watcher_interval: 3

# --- Paths ---
workspace_dir: "./workspace"
skills_dir: "./skills"

# --- Behavior ---
max_iterations: 200
tool_timeout: 120
error_escalation_threshold: 3
watcher_interval: 5

# --- Search ---
search_backend: duckduckgo

# --- Browser ---
browser_headless: true
