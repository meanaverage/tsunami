<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSUNAMI</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a25;
  --surface3: #222233;
  --border: #2a2a3a;
  --text: #e0e0e8;
  --dim: #666680;
  --accent: #4a9eff;
  --accent2: #2a5e9f;
  --green: #4aff8a;
  --red: #ff4a6a;
  --yellow: #ffd54a;
  --purple: #b44aff;
  --mono: 'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; height:100vh; overflow:hidden; }

/* Layout: sidebar + chat + computer */
.app { display:grid; grid-template-columns:240px 1fr 1fr; grid-template-rows:44px 1fr; height:100vh; }

/* Top bar */
.topbar {
  grid-column:1/-1;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px;
}
.topbar .logo { font-size:15px; font-weight:700; letter-spacing:3px; }
.topbar .logo span { color:var(--accent); }
.topbar .status { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--dim); }
.dot { width:7px;height:7px;border-radius:50%;background:var(--red); }
.dot.ok { background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* Left sidebar — history */
.sidebar {
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.sidebar-header {
  padding:12px 16px;
  font-size:11px; text-transform:uppercase; letter-spacing:2px;
  color:var(--dim);
  border-bottom:1px solid var(--border);
}
.sidebar-content { flex:1; overflow-y:auto; padding:8px; }
.history-item {
  padding:8px 12px; border-radius:6px; cursor:pointer;
  font-size:11px; color:var(--dim); margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.history-item:hover { background:var(--surface2); color:var(--text); }
.history-item.active { background:var(--accent2); color:var(--accent); }
.sidebar-footer {
  padding:12px; border-top:1px solid var(--border);
  font-size:10px; color:var(--dim); text-align:center; line-height:1.6;
}
.sidebar-footer em { color:var(--accent); font-style:normal; }

/* Center — Chat */
.chat {
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
}
.chat-feed { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
.chat-feed::-webkit-scrollbar { width:5px; }
.chat-feed::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.chat-input {
  padding:12px 16px;
  border-top:1px solid var(--border);
  display:flex; gap:8px;
}
.chat-input input {
  flex:1; background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-family:var(--mono);
  font-size:13px; padding:10px 14px; outline:none;
}
.chat-input input:focus { border-color:var(--accent); }
.chat-input button {
  background:var(--accent); color:#000; border:none; border-radius:6px;
  padding:10px 16px; font-family:var(--mono); font-size:12px;
  font-weight:700; cursor:pointer; letter-spacing:1px;
}
.chat-input button:disabled { opacity:0.3; cursor:not-allowed; }

/* Messages */
.msg { padding:10px 14px; border-radius:8px; max-width:90%; line-height:1.5; word-wrap:break-word; }
.msg.user { background:var(--accent2); align-self:flex-end; border-bottom-right-radius:2px; }
.msg.agent { background:var(--surface2); border-left:3px solid var(--accent); align-self:flex-start; }
.msg.result { background:var(--surface2); border-left:3px solid var(--green); align-self:flex-start; white-space:pre-wrap; }
.msg.error { border-left:3px solid var(--red); background:var(--surface2); color:var(--red); }
.msg.sys { background:transparent; color:var(--dim); font-size:11px; align-self:center; }

/* Right — Computer view */
.computer {
  display:flex; flex-direction:column;
  background:var(--bg);
}

.computer-tabs {
  display:flex; border-bottom:1px solid var(--border); background:var(--surface);
}
.tab {
  padding:10px 16px; font-size:11px; color:var(--dim);
  cursor:pointer; border-bottom:2px solid transparent;
  text-transform:uppercase; letter-spacing:1px;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab:hover { color:var(--text); }

.computer-content { flex:1; overflow-y:auto; padding:16px; }
.computer-content::-webkit-scrollbar { width:5px; }
.computer-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* Activity feed (computer view) */
.activity-item {
  padding:10px 12px; margin-bottom:6px;
  background:var(--surface); border-radius:6px;
  border-left:3px solid var(--border);
  font-size:12px;
}
.activity-item.tool { border-left-color:var(--purple); }
.activity-item.file { border-left-color:var(--yellow); }
.activity-item.shell { border-left-color:var(--green); }
.activity-item.search { border-left-color:var(--accent); }
.activity-item .act-header {
  display:flex; justify-content:space-between; margin-bottom:4px;
}
.act-label { color:var(--purple); font-weight:600; font-size:11px; }
.act-time { color:var(--dim); font-size:10px; }
.act-content { color:var(--dim); font-size:11px; white-space:pre-wrap; max-height:120px; overflow-y:auto; }

/* File tree */
.file-tree { font-size:12px; }
.file-item {
  padding:6px 12px; display:flex; justify-content:space-between;
  border-bottom:1px solid var(--border); cursor:pointer;
}
.file-item:hover { background:var(--surface2); }
.file-name { color:var(--text); }
.file-size { color:var(--dim); font-size:10px; }

/* Plan view */
.plan-phase {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px; margin-bottom:4px;
  background:var(--surface); border-radius:6px;
}
.phase-marker {
  width:12px; height:12px; border-radius:50%;
  border:2px solid var(--border); flex-shrink:0;
}
.phase-marker.active { border-color:var(--accent); background:var(--accent); box-shadow:0 0 8px var(--accent2); }
.phase-marker.complete { border-color:var(--green); background:var(--green); }
.phase-title { font-size:12px; }
.phase-title.active { color:var(--accent); font-weight:600; }
.phase-title.complete { color:var(--green); text-decoration:line-through; opacity:0.7; }

/* Loop indicator */
.loop-bar {
  display:flex; gap:2px; padding:12px 16px;
  background:var(--surface); border-bottom:1px solid var(--border);
}
.loop-dot {
  flex:1; height:4px; border-radius:2px; background:var(--surface3);
  transition:background 0.3s;
}
.loop-dot.active { background:var(--accent); }
.loop-dot.done { background:var(--green); }

/* Iter badge */
.iter-badge {
  position:fixed; bottom:80px; right:20px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; padding:8px 14px; z-index:10;
  font-size:11px; color:var(--dim);
}
.iter-badge strong { color:var(--accent); font-size:18px; }
</style>
</head>
<body>
<div class="app">

<!-- Top bar -->
<div class="topbar">
  <div class="logo"><span>TSUNAMI</span></div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">connecting</span>
    <span id="modelInfo"></span>
  </div>
</div>

<!-- Left sidebar -->
<div class="sidebar">
  <div class="sidebar-header">History</div>
  <div class="sidebar-content" id="historyList"></div>
  <div class="sidebar-footer">
    <em>TSUNAMI</em><br>
    reborn from the flood
  </div>
</div>

<!-- Center: Chat -->
<div class="chat">
  <div class="loop-bar" id="loopBar">
    <div class="loop-dot" data-s="0"></div>
    <div class="loop-dot" data-s="1"></div>
    <div class="loop-dot" data-s="2"></div>
    <div class="loop-dot" data-s="3"></div>
    <div class="loop-dot" data-s="4"></div>
    <div class="loop-dot" data-s="5"></div>
  </div>
  <div class="chat-feed" id="chatFeed">
    <div class="msg sys">tsunami awaits a task</div>
  </div>
  <div class="chat-input">
    <input id="taskInput" placeholder="give tsunami a task..." autofocus />
    <button id="sendBtn" onclick="send()">RUN</button>
  </div>
</div>

<!-- Right: Computer -->
<div class="computer">
  <div class="computer-tabs">
    <div class="tab active" data-tab="activity" onclick="switchTab('activity')">Activity</div>
    <div class="tab" data-tab="files" onclick="switchTab('files')">Files</div>
    <div class="tab" data-tab="plan" onclick="switchTab('plan')">Plan</div>
    <div class="tab" data-tab="output" onclick="switchTab('output')">Output</div>
  </div>
  <div class="computer-content" id="compContent">
    <div class="activity-item" style="border-left-color:var(--dim)">
      <div class="act-content">waiting for first task...</div>
    </div>
  </div>
</div>

</div>

<div class="iter-badge"><strong id="iterN">0</strong> iterations</div>

<script>
let ws, running=false, activeTab='activity', history=[];
const activities=[], files=[], planPhases=[], outputs=[];

function connect() {
  const p = location.protocol==='https:'?'wss:':'ws:';
  ws = new WebSocket(`${p}//${location.host}/ws`);
  ws.onopen = () => { setStatus(true,'connected'); fetchHealth(); };
  ws.onclose = () => { setStatus(false,'disconnected'); setTimeout(connect,3000); };
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function setStatus(ok,text) {
  document.getElementById('dot').className = 'dot'+(ok?' ok':'');
  document.getElementById('statusText').textContent = text;
}

function handle(m) {
  if(m.type==='start') {
    running=true;
    document.getElementById('sendBtn').disabled=true;
    document.getElementById('iterN').textContent='0';
    activities.length=0; outputs.length=0; planPhases.length=0;
    setLoop(0);
    addChat('sys','task: '+m.task);
    addActivity('system','Task started',m.task);
  }
  else if(m.type==='step') {
    document.getElementById('iterN').textContent=m.iteration;

    if(m.plan) {
      planPhases.length=0;
      m.plan.phases.forEach(p=>planPhases.push(p));
      if(activeTab==='plan') renderPlan();
    }

    (m.events||[]).forEach(evt => {
      if(evt.tool) {
        setLoop(2);
        const cat = evt.tool.startsWith('file')||evt.tool.startsWith('match')?'file':
                    evt.tool.startsWith('shell')?'shell':
                    evt.tool.startsWith('search')?'search':'tool';
        addActivity(cat, evt.tool, JSON.stringify(evt.args||{}).slice(0,300));
        addChat('agent',`<b>${evt.tool}</b>`);
        setTimeout(()=>setLoop(3),200);
      }
      if(evt.role==='tool_result') {
        addActivity('shell','result',evt.content.slice(0,500));
        setTimeout(()=>setLoop(4),200);
      }
    });

    if(m.complete) setLoop(5);
    else setTimeout(()=>setLoop(0),400);
  }
  else if(m.type==='complete') {
    running=false;
    document.getElementById('sendBtn').disabled=false;
    setLoop(5);
    addChat('result',m.result||'done');
    outputs.push(m.result||'');
    addActivity('system','Complete',`${m.iterations} iterations`);
    history.push({task:activities[0]?.content||'task',iters:m.iterations});
    renderHistory();
    if(activeTab==='output') renderOutput();
  }
  else if(m.type==='error') {
    running=false;
    document.getElementById('sendBtn').disabled=false;
    addChat('error',m.message);
    addActivity('system','Error',m.message);
  }
  scrollFeeds();
}

function addChat(type,html) {
  const f=document.getElementById('chatFeed');
  const d=document.createElement('div');
  d.className='msg '+type;
  d.innerHTML=html;
  f.appendChild(d);
}

function addActivity(cat,label,content) {
  activities.unshift({cat,label,content,time:new Date().toLocaleTimeString()});
  if(activeTab==='activity') renderActivity();
}

function setLoop(step) {
  document.querySelectorAll('.loop-dot').forEach((el,i)=>{
    el.className='loop-dot'+(i<step?' done':'')+(i===step?' active':'');
  });
}

function switchTab(tab) {
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  if(tab==='activity') renderActivity();
  else if(tab==='files') fetchFiles();
  else if(tab==='plan') renderPlan();
  else if(tab==='output') renderOutput();
}

function renderActivity() {
  const c=document.getElementById('compContent');
  c.innerHTML=activities.slice(0,50).map(a=>`
    <div class="activity-item ${a.cat}">
      <div class="act-header"><span class="act-label">${a.label}</span><span class="act-time">${a.time}</span></div>
      <div class="act-content">${esc(a.content||'').slice(0,500)}</div>
    </div>
  `).join('');
}

function renderPlan() {
  const c=document.getElementById('compContent');
  if(!planPhases.length) { c.innerHTML='<div style="color:var(--dim)">no plan created — task is simple enough to act directly</div>'; return; }
  c.innerHTML=planPhases.map(p=>`
    <div class="plan-phase">
      <div class="phase-marker ${p.status}"></div>
      <div class="phase-title ${p.status}">${p.id}. ${p.title}</div>
    </div>
  `).join('');
}

function renderOutput() {
  const c=document.getElementById('compContent');
  c.innerHTML=outputs.length?`<div style="white-space:pre-wrap;line-height:1.6">${esc(outputs[outputs.length-1])}</div>`
    :'<div style="color:var(--dim)">no output yet</div>';
}

async function fetchFiles() {
  const c=document.getElementById('compContent');
  try {
    const r=await fetch('/api/workspace');
    const d=await r.json();
    c.innerHTML='<div class="file-tree">'+d.files.map(f=>
      `<div class="file-item"><span class="file-name">${f.path}</span><span class="file-size">${humanSize(f.size)}</span></div>`
    ).join('')+'</div>';
  } catch(e) { c.innerHTML='<div style="color:var(--dim)">could not load files</div>'; }
}

function renderHistory() {
  const h=document.getElementById('historyList');
  h.innerHTML=history.map((item,i)=>
    `<div class="history-item">${item.task.slice(0,40)} (${item.iters})</div>`
  ).join('');
}

function scrollFeeds() {
  document.getElementById('chatFeed').scrollTop=99999;
}

function send() {
  const inp=document.getElementById('taskInput');
  const task=inp.value.trim();
  if(!task||!ws||running) return;
  addChat('user',esc(task));
  ws.send(JSON.stringify({type:'run',task}));
  inp.value='';
}

document.getElementById('taskInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

async function fetchHealth() {
  try {
    const r=await fetch('/api/health');
    const d=await r.json();
    document.getElementById('modelInfo').textContent=d.model_name+' | '+d.tool_count+' tools';
    setStatus(d.model_ok, d.model_ok?'model ready':'model offline');
  } catch(e){}
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function humanSize(b) { for(const u of ['B','KB','MB','GB']){if(b<1024)return b.toFixed(0)+u;b/=1024;} return b.toFixed(1)+'TB'; }

connect();
</script>
</body>
</html>
