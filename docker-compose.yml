# TSUNAMI — Docker Compose
#
# Start:    docker compose up
# With GPU: docker compose --profile gpu up
# Task:     docker compose run tsunami "build me a calculator"
# Stop:     docker compose down

services:
  tsunami:
    build: .
    ports:
      - "9876:9876"   # Dev server (see your builds here)
      - "8090:8090"   # Wave LLM API
      - "8092:8092"   # Eddy LLM API
      - "3002:3002"   # WebSocket bridge
    volumes:
      - tsunami-workspace:/app/workspace
    stdin_open: true
    tty: true

volumes:
  tsunami-workspace:
