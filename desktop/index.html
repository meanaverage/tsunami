<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tsunami</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080810; --bg2: #0c0c18; --panel: #0e0e1c; --panel2: #12122a;
      --border: #1a1a30; --border-hi: #252550;
      --text: #c8c8d8; --muted: #4a4a6a;
      --accent: #1a8a8a; --accent-glow: #0d6868; --accent-bright: #2ab8b8;
      --green: #3da87a; --yellow: #b8a040; --red: #a83a3a;
      --blue: #4070a8; --purple: #7050a0; --orange: #a86830;
    }
    html, body, #app { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace; font-size: 13px; overflow: hidden; }

    /* === 3-COLUMN LAYOUT === */
    #app { display: grid; grid-template-columns: 200px 1fr 1fr; grid-template-rows: 36px 1fr; height: 100vh; }

    /* Top bar spans everything */
    .top-bar { grid-column: 1 / -1; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 12px; -webkit-app-region: drag; }
    .top-bar .logo { color: var(--accent-bright); font-weight: 700; font-size: 13px; letter-spacing: 2px; }
    .top-bar .spacer { flex: 1; }
    .top-bar .hud { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .dot.off { background: var(--red); }

    /* === COL 1: PROJECT LIST === */
    .projects { background: var(--bg); border-right: 1px solid var(--border); overflow-y: auto; }
    .projects-header { padding: 8px 10px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .project-item { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 12px; }
    .project-item:hover { background: var(--panel); }
    .project-item.active { background: var(--panel2); border-left: 2px solid var(--accent); color: var(--accent-bright); }
    .project-item .name { font-weight: 500; }
    .project-item .time { color: var(--muted); font-size: 10px; margin-top: 2px; }
    .new-project { padding: 8px 10px; cursor: pointer; color: var(--accent); font-size: 12px; border-bottom: 1px solid var(--border); }
    .new-project:hover { background: var(--panel); }

    /* === COL 2: CHAT === */
    .chat { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg2); }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 14px; }
    .msg { margin-bottom: 10px; line-height: 1.6; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg.user { color: var(--accent-bright); }
    .msg.user::before { content: "you › "; font-size: 11px; color: var(--muted); }
    .msg.agent { padding-left: 10px; border-left: 2px solid var(--border-hi); }
    .msg.tool { color: var(--muted); font-size: 11px; }
    .msg.tool::before { content: "⚙ "; }
    .msg.error { color: var(--red); }
    .msg.system { color: var(--muted); font-style: italic; font-size: 11px; }
    .chat-input { display: flex; padding: 8px; gap: 6px; border-top: 1px solid var(--border); background: var(--panel); }
    .chat-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input input::placeholder { color: var(--muted); }
    .chat-input button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 600; cursor: pointer; }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .welcome h1 { color: var(--accent-bright); font-size: 28px; font-weight: 300; letter-spacing: 5px; text-shadow: 0 0 20px var(--accent-glow); }
    .welcome p { color: var(--muted); font-size: 12px; margin-top: 4px; }

    /* === COL 3: WORKSPACE (code + file tree + preview) === */
    .workspace { display: flex; flex-direction: column; background: var(--bg); }

    /* Workspace tabs */
    .ws-tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); min-height: 30px; }
    .ws-tab { padding: 6px 14px; cursor: pointer; color: var(--muted); font-size: 11px; border-right: 1px solid var(--border); }
    .ws-tab:hover { color: var(--text); }
    .ws-tab.active { color: var(--accent-bright); background: var(--bg); border-bottom: 2px solid var(--accent); }

    /* Workspace content — code view has its own sidebar */
    .ws-content { flex: 1; display: flex; overflow: hidden; }

    /* Code file tree (inside workspace) */
    .code-sidebar { width: 180px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
    .code-sidebar-header { padding: 6px 8px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .code-file { padding: 3px 6px 3px 14px; cursor: pointer; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .code-file:hover { background: var(--panel2); }
    .code-file.active { background: var(--panel2); color: var(--accent-bright); }

    /* Code editor area */
    .code-area { flex: 1; overflow: auto; padding: 10px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    .code-area .ln { color: var(--muted); display: inline-block; width: 30px; text-align: right; margin-right: 10px; user-select: none; }
    .code-path { padding: 4px 10px; background: var(--panel); font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }

    /* Preview */
    .preview-frame { width: 100%; height: 100%; border: none; background: #fff; }

    /* Terminal */
    .terminal { padding: 10px; font-size: 11px; line-height: 1.5; overflow-y: auto; height: 100%; }
    .terminal .cmd { color: var(--green); }
    .terminal .out { color: var(--text); }
    .terminal .err { color: var(--red); }

    /* HUD overlay */
    .hud-float { position: fixed; top: 42px; right: 10px; font-size: 11px; color: var(--muted); background: var(--panel); padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border); z-index: 10; display: none; }
    .hud-float .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; display: inline-block; margin-right: 5px; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <div class="top-bar">
      <span class="logo">TSUNAMI</span>
      <span class="spacer"></span>
      <div class="hud">
        <span id="hud-text">idle</span>
        wave <div class="dot" id="wave-dot"></div>
        eddy <div class="dot" id="eddy-dot"></div>
      </div>
    </div>

    <!-- Col 1: Projects -->
    <div class="projects">
      <div class="projects-header">Sessions</div>
      <div class="new-project" onclick="newSession()">+ New Session</div>
      <div id="project-list"></div>
    </div>

    <!-- Col 2: Chat -->
    <div class="chat">
      <div class="chat-msgs" id="chat-msgs">
        <div class="welcome"><h1>tsunami</h1><p>what do you want to build?</p></div>
      </div>
      <div class="chat-input">
        <input id="prompt" placeholder="build me a..." onkeydown="if(event.key==='Enter')send()" autofocus />
        <button onclick="send()">→</button>
      </div>
    </div>

    <!-- Col 3: Workspace -->
    <div class="workspace">
      <div class="ws-tabs">
        <div class="ws-tab active" onclick="showWs('code',this)">Code</div>
        <div class="ws-tab" onclick="showWs('preview',this)">Preview</div>
        <div class="ws-tab" onclick="showWs('terminal',this)">Terminal</div>
      </div>
      <div class="ws-content" id="ws-content">
        <!-- Code view with file tree -->
        <div class="code-sidebar" id="code-sidebar">
          <div class="code-sidebar-header">Files</div>
          <div id="code-files"></div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
          <div class="code-path" id="code-path">no file selected</div>
          <div class="code-area" id="code-area"></div>
        </div>
      </div>
    </div>

    <div class="hud-float" id="hud-float"><span class="pulse"></span><span id="hud-action"></span></div>
  </div>

  <script>
    const WS_AGENT = "ws://localhost:3002"
    const WS_FILES = "ws://localhost:3003"
    let ws = null, fileWs = null
    let messages = [], termLines = [], fileList = [], codeContent = "", currentFile = ""
    let sessions = [], activeSession = null

    // === AGENT CONNECTION ===
    function connectAgent() {
      ws = new WebSocket(WS_AGENT)
      ws.onopen = () => { addTerm("Connected", "cmd"); updateDots() }
      ws.onclose = () => { updateDots(); setTimeout(connectAgent, 3000) }
      ws.onmessage = e => {
        try { handleMsg(JSON.parse(e.data)) } catch { addChat("agent", e.data) }
      }
    }

    function handleMsg(d) {
      if (d.type === "tool_call") {
        addChat("tool", `${d.name} ${d.preview || ""}`)
        addTerm(`[${d.name}] ${d.preview || ""}`, "out")
        setHud(toolLabel(d.name))
        if (d.content && d.path) { codeContent = d.content; currentFile = d.path; renderCode() }
      } else if (d.type === "message") { addChat("agent", d.text) }
      else if (d.type === "error") { addChat("error", d.text); addTerm(d.text, "err") }
      else if (d.type === "complete") {
        addChat("system", `✓ done (${d.iterations} iters)`)
        setHud("done", false)
        if (activeSession) activeSession.name = d.text?.match(/deliverables\/([^\s/]+)/)?.[1] || activeSession.name
        renderProjects()
      }
    }

    // === FILE WATCHER ===
    function connectFiles() {
      fileWs = new WebSocket(WS_FILES)
      fileWs.onclose = () => setTimeout(connectFiles, 3000)
      fileWs.onmessage = e => {
        try {
          const d = JSON.parse(e.data)
          if (d.type === "files") { fileList = d.files; renderFileTree() }
          if (d.type === "file_changed") {
            codeContent = d.content; currentFile = d.path
            renderCode(); renderFileTree()
            addTerm(`FILE ${d.path}`, "cmd")
          }
        } catch {}
      }
    }

    // === SESSIONS ===
    function newSession() {
      const s = { id: Date.now(), name: `session-${sessions.length + 1}`, messages: [], time: new Date().toLocaleTimeString() }
      sessions.unshift(s)
      activeSession = s
      messages = s.messages
      renderProjects()
      document.getElementById("chat-msgs").innerHTML = '<div class="welcome"><h1>tsunami</h1><p>what do you want to build?</p></div>'
    }

    function switchSession(id) {
      const s = sessions.find(x => x.id === id)
      if (!s) return
      activeSession = s
      messages = s.messages
      renderProjects()
      const el = document.getElementById("chat-msgs")
      el.innerHTML = messages.map(m => `<div class="msg ${m.type}">${esc(m.text)}</div>`).join("")
      el.scrollTop = el.scrollHeight
    }

    function renderProjects() {
      document.getElementById("project-list").innerHTML = sessions.filter(s => !s.hidden).map(s =>
        `<div class="project-item${s === activeSession ? " active" : ""}" onclick="switchSession(${s.id})">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="name">${esc(s.name)}</div>
            <span onclick="event.stopPropagation();hideSession(${s.id})" style="color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px" onmouseenter="this.style.color='var(--red)'" onmouseleave="this.style.color='var(--muted)'">&times;</span>
          </div>
          <div class="time">${s.time}</div>
        </div>`
      ).join("")
    }

    function hideSession(id) {
      const s = sessions.find(x => x.id === id)
      if (!s) return
      s.hidden = true
      if (s === activeSession) {
        const next = sessions.find(x => !x.hidden)
        if (next) switchSession(next.id)
        else newSession()
      }
      renderProjects()
    }

    // === CHAT ===
    function send() {
      const input = document.getElementById("prompt")
      const text = input.value.trim()
      if (!text) return
      if (!activeSession) newSession()
      // Name the session from the first prompt
      if (activeSession && activeSession.name.startsWith("session-")) {
        const words = text.split(/\s+/).filter(w => w.length > 2 && !["build","make","create","the","for","with","and","that","app","save","workspace"].includes(w.toLowerCase()))
        activeSession.name = words.slice(0, 3).join(" ") || text.slice(0, 30)
        renderProjects()
      }
      addChat("user", text)
      input.value = ""
      if (ws?.readyState === 1) { ws.send(JSON.stringify({ type: "prompt", text })); setHud("starting...") }
      else addChat("error", "not connected")
    }

    function addChat(type, text) {
      messages.push({ type, text })
      const el = document.getElementById("chat-msgs")
      const w = el.querySelector(".welcome"); if (w) w.remove()
      const div = document.createElement("div")
      div.className = `msg ${type}`
      div.textContent = text
      el.appendChild(div)
      el.scrollTop = el.scrollHeight
    }

    // === TERMINAL ===
    function addTerm(text, cls = "out") { termLines.push({ text, cls }) }

    // === CODE VIEW ===
    function renderCode() {
      if (getCurrentWs() !== "code") return
      document.getElementById("code-path").textContent = currentFile || "no file"
      const area = document.getElementById("code-area")
      if (!codeContent) { area.innerHTML = '<span style="color:var(--muted)">select a file</span>'; return }
      area.innerHTML = codeContent.split("\n").map((line, i) =>
        `<div><span class="ln">${i + 1}</span>${esc(line)}</div>`
      ).join("")
    }

    function renderFileTree() {
      const el = document.getElementById("code-files")
      if (!fileList.length) { el.innerHTML = '<div style="padding:8px;color:var(--muted)">empty</div>'; return }
      const colors = { tsx: "var(--blue)", ts: "var(--green)", css: "var(--purple)", json: "var(--orange)", html: "var(--red)", js: "var(--yellow)" }
      el.innerHTML = fileList.slice(0, 60).map(f => {
        const name = f.split("/").pop()
        const ext = name.split(".").pop()
        const c = colors[ext] || "var(--muted)"
        const active = f === currentFile ? " active" : ""
        return `<div class="code-file${active}" onclick="selectFile('${esc(f)}')"><span style="color:${c};font-size:9px">●</span>${esc(name)}</div>`
      }).join("")
    }

    function selectFile(path) { currentFile = path; renderCode(); renderFileTree() }

    // === WORKSPACE TABS ===
    function showWs(view, tab) {
      document.querySelectorAll(".ws-tab").forEach(t => t.classList.remove("active"))
      if (tab) tab.classList.add("active")
      const c = document.getElementById("ws-content")
      if (view === "code") {
        c.innerHTML = `
          <div class="code-sidebar" id="code-sidebar"><div class="code-sidebar-header">Files</div><div id="code-files"></div></div>
          <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
            <div class="code-path" id="code-path">${esc(currentFile || "no file")}</div>
            <div class="code-area" id="code-area"></div>
          </div>`
        renderCode(); renderFileTree()
      } else if (view === "preview") {
        c.innerHTML = '<iframe class="preview-frame" src="http://localhost:9876"></iframe>'
      } else if (view === "terminal") {
        c.innerHTML = '<div class="terminal" id="term-view"></div>'
        const tv = document.getElementById("term-view")
        termLines.forEach(l => { const d = document.createElement("div"); d.className = l.cls; d.textContent = l.text; tv.appendChild(d) })
        tv.scrollTop = tv.scrollHeight
      }
    }
    function getCurrentWs() { return document.querySelector(".ws-tab.active")?.textContent.toLowerCase() || "code" }

    // === HUD ===
    function setHud(text, active = true) {
      const el = document.getElementById("hud-float")
      el.style.display = active ? "block" : "none"
      document.getElementById("hud-action").textContent = text
      document.getElementById("hud-text").textContent = active ? text : "idle"
    }
    function toolLabel(n) {
      return { file_write:"writing code", file_edit:"editing", shell_exec:"running command", search_web:"searching", project_init:"scaffolding", swell:"dispatching eddies", undertow:"testing" }[n] || n.replace("_"," ")
    }

    // === HEALTH ===
    function updateDots() {
      document.getElementById("wave-dot").className = "dot " + (ws?.readyState === 1 ? "on" : "off")
    }
    async function checkHealth() {
      for (const [id, port] of [["wave-dot", 8090], ["eddy-dot", 8092]]) {
        try { const r = await fetch(`http://localhost:${port}/health`, {signal: AbortSignal.timeout(2000)}); document.getElementById(id).className = "dot " + (r.ok ? "on" : "off") }
        catch { document.getElementById(id).className = "dot off" }
      }
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML }

    // === INIT ===
    newSession()
    connectAgent()
    connectFiles()
    checkHealth()
    setInterval(checkHealth, 5000)
  </script>
</body>
</html>
