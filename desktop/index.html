<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tsunami</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080810;
      --bg2: #0c0c18;
      --panel: #0e0e1c;
      --panel2: #12122a;
      --border: #1a1a30;
      --border-hi: #252550;
      --text: #c8c8d8;
      --muted: #4a4a6a;
      --accent: #1a8a8a;
      --accent-glow: #0d6868;
      --accent-bright: #2ab8b8;
      --green: #3da87a;
      --yellow: #b8a040;
      --red: #a83a3a;
      --blue: #4070a8;
      --purple: #7050a0;
      --orange: #a86830;
    }
    html, body, #app { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; overflow: hidden; }

    /* === LAYOUT: Chat left, Artifacts right === */
    #app { display: grid; grid-template-columns: 48px 200px 1fr 1fr; grid-template-rows: 40px 1fr; }

    /* File sidebar */
    .file-sidebar { grid-row: 2; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; font-size: 12px; }
    .file-sidebar-header { padding: 8px 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 10px; border-bottom: 1px solid var(--border); }
    .sidebar-file { padding: 3px 8px 3px 16px; cursor: pointer; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; font-size: 11px; }
    .sidebar-file:hover { background: var(--panel2); }
    .sidebar-file.active { background: var(--panel2); color: var(--accent-bright); }

    /* Activity bar */
    .activity-bar { grid-row: 1 / -1; background: var(--bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 2px; }
    .activity-bar button { width: 38px; height: 38px; border: none; background: none; color: var(--muted); cursor: pointer; border-radius: 6px; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .activity-bar button:hover { color: var(--text); background: var(--panel); }
    .activity-bar button.active { color: var(--accent-bright); background: var(--panel2); border-left: 2px solid var(--accent); }

    /* Top bar */
    .top-bar { grid-column: 2 / -1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; -webkit-app-region: drag; }
    .top-bar .logo { color: var(--accent-bright); font-weight: 700; font-size: 14px; letter-spacing: 2px; }
    .top-bar .status-hud { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    .top-bar .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .top-bar .dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .top-bar .dot.off { background: var(--red); }

    /* === CHAT PANE (left) === */
    .chat-pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg2); }

    /* Plan display at top of chat */
    .plan-bar { padding: 8px 14px; background: var(--panel); border-bottom: 1px solid var(--border); font-size: 11px; display: flex; gap: 12px; flex-wrap: wrap; }
    .plan-phase { padding: 3px 10px; border-radius: 12px; font-size: 11px; }
    .plan-phase.active { background: var(--accent); color: #000; font-weight: 600; }
    .plan-phase.done { background: var(--border-hi); color: var(--green); text-decoration: line-through; }
    .plan-phase.pending { background: var(--border); color: var(--muted); }

    /* Chat messages */
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px; }
    .msg { margin-bottom: 10px; line-height: 1.6; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .msg.user { color: var(--accent-bright); }
    .msg.user::before { content: "you › "; font-size: 11px; color: var(--muted); }
    .msg.agent { padding-left: 10px; border-left: 2px solid var(--border-hi); }
    .msg.tool { color: var(--muted); font-size: 11px; padding-left: 10px; }
    .msg.tool::before { content: "⚙ "; }
    .msg.error { color: var(--red); }
    .msg.system { color: var(--muted); font-style: italic; font-size: 11px; }

    /* Input */
    .chat-input { display: flex; padding: 10px; gap: 8px; border-top: 1px solid var(--border); background: var(--panel); }
    .chat-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; transition: border-color 0.15s; }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input input::placeholder { color: var(--muted); }
    .chat-input button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 11px 18px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .chat-input button:hover { background: var(--accent-glow); }

    /* === ARTIFACTS PANE (right) === */
    .artifacts-pane { display: flex; flex-direction: column; background: var(--bg); position: relative; }

    /* Artifacts tab bar */
    .artifact-tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); min-height: 32px; overflow-x: auto; }
    .artifact-tab { padding: 7px 16px; cursor: pointer; border-right: 1px solid var(--border); color: var(--muted); font-size: 11px; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .artifact-tab:hover { color: var(--text); }
    .artifact-tab.active { color: var(--accent-bright); background: var(--bg); border-bottom: 2px solid var(--accent); }

    /* Artifact content */
    .artifact-content { flex: 1; overflow: auto; position: relative; }

    /* Terminal view */
    .terminal-view { padding: 12px; font-size: 12px; line-height: 1.5; }
    .terminal-view .cmd { color: var(--green); }
    .terminal-view .out { color: var(--text); }
    .terminal-view .err { color: var(--red); }

    /* Code view */
    .code-view { padding: 12px; font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
    .code-view .line-num { color: var(--muted); display: inline-block; width: 35px; text-align: right; margin-right: 12px; user-select: none; }
    .code-view .highlight { background: rgba(26,138,138,0.15); display: block; margin: 0 -12px; padding: 0 12px; }

    /* Preview iframe */
    .preview-frame { width: 100%; height: 100%; border: none; background: #fff; }

    /* File manager */
    .file-list { padding: 8px; }
    .file-item { padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
    .file-item:hover { background: var(--panel2); }
    .file-item .ext { font-size: 10px; color: var(--muted); }

    /* Welcome / empty state */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; background: radial-gradient(ellipse at center bottom, var(--panel2) 0%, var(--bg) 70%); }
    .welcome h1 { color: var(--accent-bright); font-size: 32px; font-weight: 300; letter-spacing: 6px; margin-bottom: 6px; text-shadow: 0 0 20px var(--accent-glow); }
    .welcome p { color: var(--muted); font-size: 13px; }

    /* Status HUD overlay */
    .hud-status { position: absolute; top: 8px; right: 12px; font-size: 11px; color: var(--muted); background: var(--bg); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border); z-index: 5; display: flex; align-items: center; gap: 6px; }
    .hud-status .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Responsive */
    @media (max-width: 900px) { #app { grid-template-columns: 48px 1fr; } .artifacts-pane { display: none; } }
  </style>
</head>
<body>
  <div id="app">
    <!-- Activity Bar -->
    <div class="activity-bar">
      <button class="active" onclick="switchActivity(this,'chat')" title="Chat">💬</button>
      <button onclick="switchActivity(this,'files')" title="Files">📂</button>
      <button onclick="switchActivity(this,'preview')" title="Preview">👁</button>
      <button onclick="switchActivity(this,'settings')" title="Settings">⚙</button>
      <div style="flex:1"></div>
      <button onclick="switchActivity(this,'help')" title="Help" style="font-size:13px">?</button>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
      <span class="logo">TSUNAMI</span>
      <span id="project-name" style="color:var(--muted);font-size:12px">ready</span>
      <div class="status-hud">
        <span id="hud-text">idle</span>
        <span>wave</span><div class="dot" id="wave-dot"></div>
        <span>eddy</span><div class="dot" id="eddy-dot"></div>
      </div>
    </div>

    <!-- File Sidebar (VS Code style) -->
    <div class="file-sidebar" id="file-sidebar">
      <div class="file-sidebar-header">Explorer</div>
      <div id="sidebar-files"><div style="padding:10px;color:var(--muted)">no project</div></div>
    </div>

    <!-- Chat Pane -->
    <div class="chat-pane">
      <div class="plan-bar" id="plan-bar" style="display:none"></div>
      <div class="chat-messages" id="chat-messages">
        <div class="welcome">
          <h1>tsunami</h1>
          <p>what do you want to build?</p>
        </div>
      </div>
      <div class="chat-input">
        <input id="prompt" placeholder="build me a..." onkeydown="if(event.key==='Enter')send()" autofocus />
        <button onclick="send()">→</button>
      </div>
    </div>

    <!-- Artifacts Pane -->
    <div class="artifacts-pane" id="artifacts-pane">
      <div class="artifact-tabs" id="artifact-tabs">
        <div class="artifact-tab active" data-view="terminal" onclick="showArtifact('terminal',this)">Terminal</div>
        <div class="artifact-tab" data-view="code" onclick="showArtifact('code',this)">Code</div>
        <div class="artifact-tab" data-view="preview" onclick="showArtifact('preview',this)">Preview</div>
        <div class="artifact-tab" data-view="files" onclick="showArtifact('files',this)">Files</div>
      </div>
      <div class="hud-status" id="hud-status" style="display:none">
        <div class="pulse"></div>
        <span id="hud-action">working...</span>
      </div>
      <div class="artifact-content" id="artifact-content">
        <div class="terminal-view" id="terminal-view"></div>
      </div>
    </div>
  </div>

  <script>
    const WS_URL = "ws://localhost:3002"
    let ws = null, connected = false
    let messages = [], terminalLines = [], codeContent = "", currentFile = ""

    // ── WebSocket ──
    function connect() {
      ws = new WebSocket(WS_URL)
      ws.onopen = () => { connected = true; updateDots(); addTerm("Connected to agent", "cmd") }
      ws.onclose = () => { connected = false; updateDots(); setTimeout(connect, 3000) }
      ws.onmessage = (e) => {
        try { handleMsg(JSON.parse(e.data)) } catch { addChat("agent", e.data) }
      }
    }

    function handleMsg(data) {
      if (data.type === "tool_call") {
        addChat("tool", `${data.name} ${data.preview || ""}`)
        addTerm(`[${data.name}] ${data.preview || ""}`, "out")
        setHud(toolLabel(data.name))

        // Show code in code view when writing files
        if (data.name === "file_write" && data.content) {
          codeContent = data.content
          currentFile = data.path || ""
          if (getCurrentArtifact() === "code") renderCode()
        }
      } else if (data.type === "message") {
        addChat("agent", data.text)
        setHud("thinking...")
      } else if (data.type === "error") {
        addChat("error", data.text)
        addTerm(data.text, "err")
      } else if (data.type === "complete") {
        addChat("system", `✓ done (${data.iterations} iterations)`)
        addTerm(`Complete: ${data.iterations} iterations`, "cmd")
        setHud("done", false)
        if (data.text?.includes("deliverables/")) {
          const m = data.text.match(/deliverables\/([^\s/]+)/)
          if (m) document.getElementById("project-name").textContent = m[1]
        }
      } else if (data.type === "plan") {
        renderPlan(data.phases)
      }
    }

    // ── Chat ──
    function send() {
      const input = document.getElementById("prompt")
      const text = input.value.trim()
      if (!text) return
      addChat("user", text)
      input.value = ""
      if (ws?.readyState === 1) {
        ws.send(JSON.stringify({ type: "prompt", text }))
        setHud("starting...")
      } else {
        addChat("error", "not connected")
      }
    }

    function addChat(type, text) {
      messages.push({ type, text })
      const el = document.getElementById("chat-messages")
      // Remove welcome on first message
      const welcome = el.querySelector(".welcome")
      if (welcome) welcome.remove()
      const div = document.createElement("div")
      div.className = `msg ${type}`
      div.textContent = text
      el.appendChild(div)
      el.scrollTop = el.scrollHeight
    }

    // ── Terminal ──
    function addTerm(text, cls = "out") {
      terminalLines.push({ text, cls })
      if (getCurrentArtifact() === "terminal") {
        const view = document.getElementById("terminal-view")
        const div = document.createElement("div")
        div.className = cls
        div.textContent = `${time()} ${text}`
        view.appendChild(div)
        view.scrollTop = view.scrollHeight
      }
    }

    // ── Code View ──
    function renderCode() {
      const el = document.getElementById("artifact-content")
      const lines = codeContent.split("\n")
      el.innerHTML = `<div class="code-view"><div style="color:var(--muted);font-size:11px;margin-bottom:8px">${esc(currentFile)}</div>` +
        lines.map((line, i) => `<div><span class="line-num">${i + 1}</span>${esc(line)}</div>`).join("") +
        `</div>`
    }

    // ── Plan ──
    function renderPlan(phases) {
      const bar = document.getElementById("plan-bar")
      bar.style.display = "flex"
      bar.innerHTML = phases.map(p =>
        `<span class="plan-phase ${p.status}">${p.title}</span>`
      ).join("")
    }

    // ── Artifacts switching ──
    function showArtifact(view, tab) {
      document.querySelectorAll(".artifact-tab").forEach(t => t.classList.remove("active"))
      if (tab) tab.classList.add("active")
      const content = document.getElementById("artifact-content")

      if (view === "terminal") {
        content.innerHTML = '<div class="terminal-view" id="terminal-view"></div>'
        const tv = document.getElementById("terminal-view")
        terminalLines.forEach(l => {
          const d = document.createElement("div")
          d.className = l.cls
          d.textContent = `${l.text}`
          tv.appendChild(d)
        })
        tv.scrollTop = tv.scrollHeight
      } else if (view === "code") {
        renderCode()
      } else if (view === "preview") {
        content.innerHTML = '<iframe class="preview-frame" src="http://localhost:9876"></iframe>'
      } else if (view === "files") {
        renderFiles()
      }
    }

    function getCurrentArtifact() {
      const active = document.querySelector(".artifact-tab.active")
      return active?.dataset.view || "terminal"
    }

    function switchActivity(btn, view) {
      document.querySelectorAll(".activity-bar button").forEach(b => b.classList.remove("active"))
      btn.classList.add("active")
      if (view === "preview") showArtifact("preview")
      else if (view === "files") showArtifact("files")
      else if (view === "chat") showArtifact("terminal")
    }

    // ── HUD ──
    function setHud(text, active = true) {
      const el = document.getElementById("hud-status")
      const action = document.getElementById("hud-action")
      el.style.display = active ? "flex" : "none"
      action.textContent = text
      document.getElementById("hud-text").textContent = active ? text : "idle"
    }

    function toolLabel(name) {
      const labels = {
        file_write: "writing code", file_edit: "editing code", file_read: "reading file",
        shell_exec: "running command", search_web: "searching", project_init: "scaffolding project",
        match_glob: "finding files", match_grep: "searching code", python_exec: "running python",
        plan_update: "planning", message_result: "delivering", swell: "dispatching eddies",
        undertow: "testing app",
      }
      return labels[name] || name.replace("_", " ")
    }

    // ── Health ──
    function updateDots() {
      document.getElementById("wave-dot").className = "dot " + (connected ? "on" : "off")
    }
    async function checkHealth() {
      for (const [id, port] of [["wave-dot", 8090], ["eddy-dot", 8092]]) {
        try {
          const r = await fetch(`http://localhost:${port}/health`, { signal: AbortSignal.timeout(2000) })
          document.getElementById(id).className = "dot " + (r.ok ? "on" : "off")
        } catch { document.getElementById(id).className = "dot off" }
      }
    }

    // ── Helpers ──
    function time() { return new Date().toLocaleTimeString("en", { hour12: false }) }
    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML }

    // ── File Watcher Connection ──
    let fileList = []
    let fileWs = null
    let changeLog = []  // persistent log of all file changes

    function connectFileWatcher() {
      fileWs = new WebSocket("ws://localhost:3003")
      fileWs.onopen = () => addTerm("File watcher connected", "cmd")
      fileWs.onclose = () => setTimeout(connectFileWatcher, 3000)
      fileWs.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data)
          if (data.type === "files") {
            fileList = data.files
            renderSidebarFiles()
          }
          if (data.type === "file_changed") {
            // Update code view if we're watching
            codeContent = data.content
            currentFile = data.path
            if (getCurrentArtifact() === "code") renderCode()
            // Auto-switch to code view on first file write
            if (changeLog.length === 0) {
              showArtifact("code", document.querySelector('[data-view="code"]'))
            }
            // Log the change
            const entry = `${time()} ${data.path}`
            changeLog.push(entry)
            addTerm(`FILE: ${data.path}`, "cmd")
          }
        } catch {}
      }
    }

    function renderSidebarFiles() {
      const el = document.getElementById("sidebar-files")
      if (fileList.length === 0) {
        el.innerHTML = '<div style="padding:10px;color:var(--muted)">no files</div>'
        return
      }
      const extColors = { tsx: "var(--blue)", ts: "var(--green)", css: "var(--purple)", json: "var(--orange)", html: "var(--red)", js: "var(--yellow)" }
      el.innerHTML = fileList.slice(0, 50).map(f => {
        const ext = f.split(".").pop()
        const color = extColors[ext] || "var(--muted)"
        const name = f.split("/").pop()
        const active = f === currentFile ? " active" : ""
        return `<div class="sidebar-file${active}" onclick="clickFile('${esc(f)}')"><span style="color:${color};font-size:9px">●</span>${esc(name)}</div>`
      }).join("")
    }

    function clickFile(path) {
      currentFile = path
      // Request this file's content from watcher by just switching to code view
      showArtifact("code", document.querySelector('[data-view="code"]'))
      renderSidebarFiles()
    }

    function renderFiles() {
      const content = document.getElementById("artifact-content")
      if (fileList.length === 0) {
        content.innerHTML = '<div class="file-list"><div style="padding:20px;color:var(--muted)">No project files yet</div></div>'
        return
      }
      const extColors = { tsx: "var(--blue)", ts: "var(--green)", css: "var(--purple)", json: "var(--orange)", html: "var(--red)", js: "var(--yellow)", md: "var(--text)", py: "var(--green)" }
      content.innerHTML = '<div class="file-list">' + fileList.map(f => {
        const ext = f.split(".").pop()
        const color = extColors[ext] || "var(--muted)"
        return `<div class="file-item" onclick="viewFile('${esc(f)}')"><span style="color:${color}">●</span> ${esc(f)} <span class="ext">.${ext}</span></div>`
      }).join("") + '</div>'
    }

    function viewFile(path) {
      currentFile = path
      // Request file content via watcher
      if (fileWs?.readyState === 1) {
        // For now just switch to code view — watcher will push content on next change
        showArtifact("code", document.querySelector('[data-view="code"]'))
      }
    }

    // ── Init ──
    connect()
    connectFileWatcher()
    checkHealth()
    setInterval(checkHealth, 5000)
  </script>
</body>
</html>
